<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Wanaag Travel & Logistics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Favicons -->
    <link href="{{ url_for('static', filename='logo.png') }}" rel="icon" type="image/png">
    <link href="{{ url_for('static', filename='logo.png') }}" rel="apple-touch-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --brand-green: #1482C5;
            --brand-orange: #2B2E74;
            --dark-purple: #2d014d;
        }
        
        body {
            background: linear-gradient(135deg, var(--brand-green) 0%, var(--brand-orange) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .reset-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            max-width: 500px;
            width: 100%;
            margin: 20px;
        }
        
        .reset-header {
            background: linear-gradient(135deg, var(--brand-green) 0%, var(--brand-orange) 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .reset-header .logo {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .reset-header .logo img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }
        
        .reset-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0 0 5px 0;
        }
        
        .reset-header p {
            font-size: 0.9rem;
            opacity: 0.9;
            margin: 0;
        }
        
        .reset-body {
            padding: 40px 30px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-label {
            color: var(--dark-purple);
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }
        
        .input-group {
            position: relative;
        }
        
        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            z-index: 2;
        }
        
        .form-control {
            padding: 12px 15px 12px 45px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }
        
        .form-control:focus {
            border-color: var(--brand-green);
            box-shadow: 0 0 0 0.2rem rgba(20, 130, 197, 0.25);
            background: white;
        }
        
        .code-input {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5rem;
            padding: 12px 15px;
        }
        
        .btn-reset {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--brand-green) 0%, var(--brand-orange) 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(20, 130, 197, 0.3);
        }
        
        .btn-reset:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        
        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-message {
            color: #dc3545;
            font-size: 0.875rem;
            margin-top: 5px;
            display: none;
        }
        
        .alert {
            border-radius: 10px;
            border: none;
            margin-bottom: 20px;
        }
        
        .back-to-login {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-to-login a {
            color: var(--brand-green);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        
        .back-to-login a:hover {
            color: var(--brand-orange);
        }
        
        .step-indicator {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
        
        .step {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #e1e5e9;
            margin: 0 5px;
            transition: all 0.3s ease;
        }
        
        .step.active {
            background: var(--brand-green);
        }
        
        .step.completed {
            background: var(--brand-orange);
        }
        
        .code-display {
            background: #f8f9fa;
            border: 2px dashed #dee2e6;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--brand-green);
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-header">
            <div class="logo">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Wanaag Travel Logo">
            </div>
            <h1>Reset Password</h1>
            <p>Enter verification code and new password</p>
        </div>
        
        <div class="reset-body">
            <div class="step-indicator">
                <div class="step completed"></div>
                <div class="step active"></div>
                <div class="step"></div>
            </div>
            
            <div id="alertContainer"></div>
            
            <form id="resetPasswordForm">
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <div class="input-group">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" class="form-control" id="email" name="email" required readonly>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="code" class="form-label">Verification Code</label>
                    <div class="input-group">
                        <i class="fas fa-key input-icon"></i>
                        <input type="text" class="form-control code-input" id="code" name="code" 
                               placeholder="000000" maxlength="6" required>
                    </div>
                    <div id="codeError" class="error-message"></div>
                </div>
                
                <div class="form-group">
                    <label for="newPassword" class="form-label">New Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" class="form-control" id="newPassword" name="newPassword" 
                               placeholder="Enter new password" required>
                    </div>
                    <div id="passwordError" class="error-message"></div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword" class="form-label">Confirm New Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" 
                               placeholder="Confirm new password" required>
                    </div>
                    <div id="confirmPasswordError" class="error-message"></div>
                </div>
                
                <button type="submit" class="btn btn-reset" id="resetBtn">
                    <span class="loading-spinner" id="loadingSpinner"></span>
                    <span id="resetText">Reset Password</span>
                </button>
            </form>
            
            <div class="back-to-login">
                <a href="/admin">
                    <i class="fas fa-arrow-left me-2"></i>
                    Back to Admin Login
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Get email from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        
        if (email) {
            document.getElementById('email').value = email;
        } else {
            // Redirect to login if no email provided
            window.location.href = '/admin';
        }
        
        // Auto-format code input
        document.getElementById('code').addEventListener('input', function(e) {
            // Only allow numbers
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        });
        
        // Form submission
        document.getElementById('resetPasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const code = document.getElementById('code').value.trim();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const resetBtn = document.getElementById('resetBtn');
            const loadingSpinner = document.getElementById('loadingSpinner');
            const resetText = document.getElementById('resetText');
            
            // Clear previous errors
            clearErrors();
            
            // Validate passwords match
            if (newPassword !== confirmPassword) {
                showError('confirmPasswordError', 'Passwords do not match');
                return;
            }
            
            if (newPassword.length < 6) {
                showError('passwordError', 'Password must be at least 6 characters long');
                return;
            }
            
            // Show loading state
            resetBtn.disabled = true;
            loadingSpinner.style.display = 'inline-block';
            resetText.textContent = 'Resetting Password...';
            
            try {
                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        code: code,
                        new_password: newPassword
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showAlert('Password reset successfully! Redirecting to login...', 'success');
                    setTimeout(() => {
                        window.location.href = '/admin';
                    }, 2000);
                } else {
                    showAlert(data.error || 'Failed to reset password', 'danger');
                }
            } catch (error) {
                console.error('Reset password error:', error);
                showAlert('Network error. Please try again.', 'danger');
            } finally {
                // Reset button state
                resetBtn.disabled = false;
                loadingSpinner.style.display = 'none';
                resetText.textContent = 'Reset Password';
            }
        });
        
        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }
        
        function showError(elementId, message) {
            const errorElement = document.getElementById(elementId);
            errorElement.textContent = message;
            errorElement.style.display = 'block';
        }
        
        function clearErrors() {
            const errorElements = ['codeError', 'passwordError', 'confirmPasswordError'];
            errorElements.forEach(id => {
                const element = document.getElementById(id);
                element.textContent = '';
                element.style.display = 'none';
            });
            document.getElementById('alertContainer').innerHTML = '';
        }
    </script>
</body>
</html>
